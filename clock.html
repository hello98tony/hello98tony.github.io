<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic Analog Clock</title>

<style>

:root{
--bg:#eef1f7;
--clock-bg:white;
--border:#1e293b;
--hand:#1e293b;
--accent:#3b82f6;
}

body.dark{
--bg:#050816;
--clock-bg:#0b1124;
--border:#60a5fa;
--hand:#e2e8f0;
--accent:#60a5fa;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:var(--bg);
font-family:Arial;
transition:0.4s;
}

/* container */

.container{
text-align:center;
}

/* clock */

.clock{
width:280px;
height:280px;
border-radius:50%;
border:3px solid var(--border);
position:relative;
background:var(--clock-bg);
box-shadow:
0 0 25px rgba(0,0,0,0.2),
0 0 40px rgba(0,0,0,0.1),
inset 0 0 20px rgba(0,0,0,0.1);
}

/* glowing effect in dark mode */

body.dark .clock{
box-shadow:
0 0 20px var(--accent),
0 0 60px rgba(96,165,250,0.3),
inset 0 0 20px rgba(255,255,255,0.05);
}

/* center dot */

.center{
width:12px;
height:12px;
background:var(--accent);
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* hands */

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
transform:translateX(-50%);
border-radius:5px;
}

.hour{
width:6px;
height:70px;
background:var(--hand);
}

.minute{
width:4px;
height:100px;
background:var(--hand);
}

.second{
width:2px;
height:120px;
background:#ff4d4d;
}

/* futuristic toggle switch */

.switch{
position:relative;
display:inline-block;
width:55px;
height:26px;
margin-top:30px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:30px;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:var(--accent);
}

input:checked + .slider:before{
transform:translateX(28px);
}

/* glow when dark mode */

body.dark input:checked + .slider{
box-shadow:0 0 10px var(--accent);
}

</style>
</head>

<body>

<div class="container">

<div class="clock">

<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>

<div class="center"></div>

</div>

<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider"></span>
</label>

</div>

<script>

const toggle = document.getElementById("modeToggle");

toggle.addEventListener("change", () => {
document.body.classList.toggle("dark");
});

function updateClock(){

const now = new Date();

const sec = now.getSeconds();
const min = now.getMinutes();
const hr = now.getHours();

const secDeg = sec * 6;
const minDeg = min * 6 + sec * 0.1;
const hrDeg = hr * 30 + min * 0.5;

document.getElementById("second").style.transform =
`translateX(-50%) rotate(${secDeg}deg)`;

document.getElementById("minute").style.transform =
`translateX(-50%) rotate(${minDeg}deg)`;

document.getElementById("hour").style.transform =
`translateX(-50%) rotate(${hrDeg}deg)`;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
