<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic Calculator</title>

<style>

:root{
--bg:#eef1f7;
--calc-bg:white;
--text:#1e293b;
--accent:#3b82f6;
--btn:#f1f5f9;
}

body.dark{
--bg:#050816;
--calc-bg:#0b1124;
--text:#e2e8f0;
--accent:#60a5fa;
--btn:#111827;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:var(--bg);
font-family:Arial;
transition:0.4s;
}

/* calculator */

.calculator{
width:300px;
padding:20px;
border-radius:18px;
background:var(--calc-bg);
box-shadow:
0 0 25px rgba(0,0,0,0.2),
inset 0 0 10px rgba(0,0,0,0.05);
}

body.dark .calculator{
box-shadow:
0 0 20px var(--accent),
0 0 60px rgba(96,165,250,0.3);
}

/* display */

.display{
width:100%;
height:60px;
border:none;
outline:none;
font-size:24px;
text-align:right;
padding:10px;
border-radius:10px;
background:var(--btn);
color:var(--text);
margin-bottom:15px;
}

/* buttons */

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:55px;
font-size:18px;
border:none;
border-radius:10px;
background:var(--btn);
color:var(--text);
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.operator{
background:var(--accent);
color:white;
}

.equal{
grid-column:span 2;
background:var(--accent);
color:white;
}

/* toggle switch */

.switch{
position:absolute;
top:25px;
right:25px;
width:55px;
height:26px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:30px;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:var(--accent);
}

input:checked + .slider:before{
transform:translateX(28px);
}

</style>
</head>

<body>

<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider"></span>
</label>

<div class="calculator">

<input type="text" class="display" id="display" disabled>

<div class="buttons">

<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>
</div>

<script>

const toggle = document.getElementById("modeToggle");

toggle.addEventListener("change", () => {
document.body.classList.toggle("dark");
});

const display = document.getElementById("display");

function append(value){
display.value += value;
}

function clearDisplay(){
display.value = "";
}

function deleteLast(){
display.value = display.value.slice(0,-1);
}

function calculate(){
try{
display.value = eval(display.value);
}
catch{
display.value = "Error";
}
}

</script>

</body>
</html>
