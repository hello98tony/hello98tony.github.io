<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Battery Indicator</title>

<style>

:root{
--bg:#eef1f7;
--card:#ffffff;
--text:#1e293b;
--accent:#3b82f6;
}

body.dark{
--bg:#050816;
--card:#0b1124;
--text:#e2e8f0;
--accent:#60a5fa;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:var(--bg);
font-family:Arial;
transition:0.4s;
}

/* container */

.battery-card{
padding:30px;
border-radius:18px;
background:var(--card);
text-align:center;
width:260px;
box-shadow:
0 0 25px rgba(0,0,0,0.2),
inset 0 0 10px rgba(0,0,0,0.05);
}

body.dark .battery-card{
box-shadow:
0 0 20px var(--accent),
0 0 60px rgba(96,165,250,0.3);
}

/* battery shape */

.battery{
width:160px;
height:60px;
border:3px solid var(--accent);
border-radius:10px;
margin:20px auto;
position:relative;
}

.battery::after{
content:"";
position:absolute;
right:-10px;
top:18px;
width:8px;
height:20px;
background:var(--accent);
border-radius:2px;
}

/* battery level */

.level{
height:100%;
width:50%;
background:var(--accent);
border-radius:6px;
transition:0.5s;
}

/* text */

.percent{
font-size:24px;
color:var(--text);
}

.status{
font-size:14px;
color:var(--text);
margin-top:5px;
}

/* toggle switch */

.switch{
position:absolute;
top:25px;
right:25px;
width:55px;
height:26px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:30px;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:var(--accent);
}

input:checked + .slider:before{
transform:translateX(28px);
}

</style>
</head>

<body>

<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider"></span>
</label>

<div class="battery-card">

<div class="percent" id="percent">--%</div>

<div class="battery">
<div class="level" id="level"></div>
</div>

<div class="status" id="status">Detecting...</div>

</div>

<script>

/* dark mode toggle */

const toggle = document.getElementById("modeToggle");

toggle.addEventListener("change", () => {
document.body.classList.toggle("dark");
});

/* battery api */

navigator.getBattery().then(function(battery){

function updateBattery(){

const percent = Math.floor(battery.level * 100);

document.getElementById("percent").textContent = percent + "%";
document.getElementById("level").style.width = percent + "%";

document.getElementById("status").textContent =
battery.charging ? "Charging ⚡" : "Not Charging";

}

updateBattery();

battery.addEventListener("levelchange", updateBattery);
battery.addEventListener("chargingchange", updateBattery);

});

</script>

</body>
</html>
